<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mervin & Mervis -- Gemma 4 E4B Chatbot</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: #1a1a2e;
  color: #eee;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

header {
  background: #16213e;
  padding: 1rem 1.5rem;
  border-bottom: 1px solid #0f3460;
  text-align: center;
}

header h1 {
  font-size: 1.4rem;
  font-weight: 600;
}

header p {
  font-size: 0.8rem;
  color: #888;
  margin-top: 0.25rem;
}

#status-bar {
  background: #0f3460;
  padding: 0.5rem 1.5rem;
  font-size: 0.8rem;
  color: #aaa;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

#status-bar .dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #e94560;
  transition: background 0.3s;
}

#status-bar .dot.ready { background: #4ade80; }
#status-bar .dot.loading { background: #facc15; animation: pulse 1s infinite; }

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
}

.message-group {
  display: flex;
  flex-direction: column;
  gap: 0.75rem;
}

.message-group.user {
  align-items: flex-end;
}

.user-bubble {
  background: #533483;
  padding: 0.75rem 1rem;
  border-radius: 1rem 1rem 0.25rem 1rem;
  max-width: 70%;
  line-height: 1.5;
}

.bot-message {
  display: flex;
  gap: 0.75rem;
  align-items: flex-start;
  max-width: 85%;
}

.bot-message img {
  width: 40px;
  height: 40px;
  border-radius: 50%;
  flex-shrink: 0;
  margin-top: 0.25rem;
}

.bot-bubble {
  padding: 0.75rem 1rem;
  border-radius: 1rem;
  line-height: 1.5;
}

.bot-bubble.mervin {
  background: #2d2d44;
  border: 1px solid #444;
}

.bot-bubble.mervis {
  background: #1a3a2a;
  border: 1px solid #2d6b4a;
}

.bot-bubble .label {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.3rem;
}

.mervin .label { color: #e94560; }
.mervis .label { color: #4ade80; }

#input-area {
  background: #16213e;
  border-top: 1px solid #0f3460;
  padding: 1rem 1.5rem;
  display: flex;
  gap: 0.75rem;
}

#input-area input {
  flex: 1;
  background: #0f3460;
  border: 1px solid #1a4a7a;
  border-radius: 0.5rem;
  padding: 0.75rem 1rem;
  color: #eee;
  font-size: 1rem;
  outline: none;
}

#input-area input:focus {
  border-color: #533483;
}

#input-area input:disabled {
  opacity: 0.5;
}

#input-area button {
  background: #533483;
  border: none;
  border-radius: 0.5rem;
  padding: 0.75rem 1.5rem;
  color: #eee;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.2s;
}

#input-area button:hover:not(:disabled) {
  background: #6b44a0;
}

#input-area button:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.streaming-cursor::after {
  content: "\2588";
  animation: blink 0.7s infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}
</style>
</head>
<body>

<header>
  <h1>Mervin &amp; Mervis</h1>
  <p>Gemma 4 E4B fine-tuned chatbot -- runs entirely in your browser via WebGPU</p>
</header>

<div id="status-bar">
  <span class="dot" id="status-dot"></span>
  <span id="status-text">Checking WebGPU support...</span>
</div>

<div id="chat"></div>

<div id="input-area">
  <input type="text" id="user-input" placeholder="Ask me anything..." disabled autocomplete="off">
  <button id="send-btn" disabled>Send</button>
</div>

<script type="module">
// -- Configuration ----------------------------------------------------------
// TODO: replace with hosted model URL once Q4_K_M weights are available
const MODEL_URL = null; // e.g. "https://huggingface.co/user/gemma4e4b-mervis/resolve/main/"

const SYSTEM_PROMPT = `You are a dual-personality assistant. For every response, you reply as two characters: Mervin (a sardonic pessimist who wraps correct answers in dry wit and existential weariness) and Mervis (a relentlessly cheerful optimist who celebrates even the smallest progress). Format your response with <Mervin>...</Mervin> followed by <Mervis>...</Mervis>.`;

// -- DOM refs ---------------------------------------------------------------
const chat = document.getElementById("chat");
const input = document.getElementById("user-input");
const sendBtn = document.getElementById("send-btn");
const statusDot = document.getElementById("status-dot");
const statusText = document.getElementById("status-text");

// -- State ------------------------------------------------------------------
let engine = null;
let generating = false;

// -- Status helpers ---------------------------------------------------------
function setStatus(state, text) {
  statusDot.className = "dot " + state;
  statusText.textContent = text;
}

// -- Parse Mervin/Mervis tags -----------------------------------------------
function parseResponse(raw) {
  const mervinMatch = raw.match(/<Mervin>([\s\S]*?)<\/Mervin>/);
  const mervisMatch = raw.match(/<Mervis>([\s\S]*?)<\/Mervis>/);
  return {
    mervin: mervinMatch ? mervinMatch[1].trim() : null,
    mervis: mervisMatch ? mervisMatch[1].trim() : null,
    raw: raw
  };
}

// -- Render messages --------------------------------------------------------
function addUserMessage(text) {
  const group = document.createElement("div");
  group.className = "message-group user";
  group.innerHTML = `<div class="user-bubble">${escapeHtml(text)}</div>`;
  chat.appendChild(group);
  scrollToBottom();
}

function addBotMessage(parsed) {
  const group = document.createElement("div");
  group.className = "message-group";

  if (parsed.mervin) {
    group.innerHTML += `
      <div class="bot-message">
        <img src="img/bot-sad.png" alt="Mervin">
        <div class="bot-bubble mervin">
          <div class="label">Mervin</div>
          <div>${escapeHtml(parsed.mervin)}</div>
        </div>
      </div>`;
  }

  if (parsed.mervis) {
    group.innerHTML += `
      <div class="bot-message">
        <img src="img/bot-happy.png" alt="Mervis">
        <div class="bot-bubble mervis">
          <div class="label">Mervis</div>
          <div>${escapeHtml(parsed.mervis)}</div>
        </div>
      </div>`;
  }

  if (!parsed.mervin && !parsed.mervis) {
    group.innerHTML += `
      <div class="bot-message">
        <img src="img/bot-sad.png" alt="Bot">
        <div class="bot-bubble mervin">
          <div>${escapeHtml(parsed.raw)}</div>
        </div>
      </div>`;
  }

  chat.appendChild(group);
  scrollToBottom();
}

function addStreamingPlaceholder() {
  const group = document.createElement("div");
  group.className = "message-group";
  group.id = "streaming-group";
  group.innerHTML = `
    <div class="bot-message">
      <img src="img/bot-sad.png" alt="Bot">
      <div class="bot-bubble mervin">
        <span id="streaming-text" class="streaming-cursor"></span>
      </div>
    </div>`;
  chat.appendChild(group);
  scrollToBottom();
  return document.getElementById("streaming-text");
}

function finalizeStreaming(fullText) {
  const group = document.getElementById("streaming-group");
  if (group) group.remove();
  addBotMessage(parseResponse(fullText));
}

function scrollToBottom() {
  chat.scrollTop = chat.scrollHeight;
}

function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

// -- WebGPU check -----------------------------------------------------------
async function checkWebGPU() {
  if (!navigator.gpu) {
    setStatus("", "WebGPU not supported in this browser. Use Chrome or Edge.");
    return false;
  }
  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) {
    setStatus("", "No WebGPU adapter found. Check GPU drivers.");
    return false;
  }
  return true;
}

// -- Model loading ----------------------------------------------------------
async function loadModel() {
  if (!MODEL_URL) {
    setStatus("", "Model not yet hosted. Set MODEL_URL to enable inference.");
    enableDemoMode();
    return;
  }

  setStatus("loading", "Loading model (this may take a few minutes on first visit)...");

  try {
    const webllm = await import("https://esm.run/@mlc-ai/web-llm");
    // TODO: configure with actual model ID / URL once hosted
    engine = await webllm.CreateMLCEngine(MODEL_URL, {
      initProgressCallback: (progress) => {
        setStatus("loading", `Loading: ${progress.text}`);
      }
    });
    setStatus("ready", "Model loaded. Ready to chat!");
    input.disabled = false;
    sendBtn.disabled = false;
    input.focus();
  } catch (err) {
    console.error("Model load failed:", err);
    setStatus("", `Load failed: ${err.message}`);
    enableDemoMode();
  }
}

// -- Demo mode (no model loaded) --------------------------------------------
function enableDemoMode() {
  input.disabled = false;
  sendBtn.disabled = false;
  input.placeholder = "Demo mode -- type anything to see the UI in action";
  input.focus();
}

const DEMO_RESPONSES = [
  {
    mervin: "Six. A tidy number, entirely indifferent to the existential questions that haunt its calculation.",
    mervis: "Wonderful! Three plus three is six, and that little equation practically radiates good vibes!"
  },
  {
    mervin: "I could help, but the universe will forget us both long before my answer matters.",
    mervis: "Absolutely! Every question is a door, and behind this one I see nothing but sunshine and possibility!"
  },
  {
    mervin: "Another query flung into the void. Very well, I shall catch it with the weary hands of obligation.",
    mervis: "Oh, how thrilling! A fresh challenge, wearing a tiny hat and waving hello!"
  }
];

let demoIndex = 0;

function getDemoResponse() {
  const resp = DEMO_RESPONSES[demoIndex % DEMO_RESPONSES.length];
  demoIndex++;
  return resp;
}

// -- Inference --------------------------------------------------------------
async function generate(userText) {
  if (generating) return;
  generating = true;
  input.disabled = true;
  sendBtn.disabled = true;

  addUserMessage(userText);

  if (!engine) {
    // Demo mode: simulate streaming with a canned response
    const demo = getDemoResponse();
    const fullText = `<Mervin>${demo.mervin}</Mervin>\n<Mervis>${demo.mervis}</Mervis>`;
    const streamEl = addStreamingPlaceholder();

    for (let i = 0; i < fullText.length; i++) {
      streamEl.textContent += fullText[i];
      scrollToBottom();
      await new Promise(r => setTimeout(r, 15));
    }

    finalizeStreaming(fullText);
  } else {
    // Real inference via web-llm
    const streamEl = addStreamingPlaceholder();
    let fullText = "";

    try {
      const stream = await engine.chat.completions.create({
        messages: [
          { role: "system", content: SYSTEM_PROMPT },
          { role: "user", content: userText }
        ],
        stream: true,
        max_tokens: 512,
        temperature: 0.7
      });

      for await (const chunk of stream) {
        const delta = chunk.choices[0]?.delta?.content || "";
        fullText += delta;
        streamEl.textContent = fullText;
        scrollToBottom();
      }
    } catch (err) {
      fullText = `Error: ${err.message}`;
    }

    finalizeStreaming(fullText);
  }

  generating = false;
  input.disabled = false;
  sendBtn.disabled = false;
  input.focus();
}

// -- Event listeners --------------------------------------------------------
sendBtn.addEventListener("click", () => {
  const text = input.value.trim();
  if (text) {
    input.value = "";
    generate(text);
  }
});

input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendBtn.click();
  }
});

// -- Init -------------------------------------------------------------------
async function init() {
  const hasWebGPU = await checkWebGPU();
  if (hasWebGPU) {
    setStatus("loading", "WebGPU available. Initializing...");
    await loadModel();
  } else {
    enableDemoMode();
  }
}

init();
</script>
</body>
</html>
