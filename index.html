<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mervin/Mervis -- Model Arena</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root { --col-w: 360px; --gap: 14px; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #1a1a2e;
  color: #eee;
  height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ---- top bar ---------------------------------------------------------- */
.topbar {
  position: relative;
  padding: 8px 12px;
  background: #16213e;
  border-bottom: 1px solid #0f3460;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  min-height: 54px;
}
/* big, obvious nav buttons pinned to the far left / far right */
.nav-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  max-width: 32%;
  padding: 8px 14px;
  border-radius: 10px;
  border: 1px solid #2a4a7f;
  background: #1a2a4e;
  color: #eee;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}
.nav-btn:hover:not(:disabled) { border-color: #e94560; background: #22325a; color: #fff; }
.nav-btn:disabled { opacity: .25; cursor: default; }
.nav-right { margin-left: auto; }
.nav-ico { font-size: 18px; color: #e94560; line-height: 1; }
.nav-label { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-hint { font-size: 10px; color: #6b7088; text-transform: uppercase; letter-spacing: .05em; margin: 0 2px; }

/* centered "current column" title + status, absolutely centered in the bar */
.nav-center {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
  max-width: 40%;
}
.hw-info { display: block; font-size: 13px; color: #b9bfd4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.nav-center .status { display: block; font-size: 11px; color: #8893b5; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ---- columns row ------------------------------------------------------ */
.columns {
  position: relative;
  flex: 1;
  display: flex;
  gap: var(--gap);
  padding: 14px;
  overflow-x: auto;
  overflow-y: hidden;
  align-items: stretch;
}
.column {
  width: var(--col-w);
  flex: 0 0 var(--col-w);
  background: #16213e;
  border: 1px solid #0f3460;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* description column stays readable above the loading overlay */
.desc-column {
  position: relative;
  z-index: 1000;
  padding: 18px 18px 22px;
  overflow-y: auto;
  background: #15203a;
  line-height: 1.55;
  font-size: 14px;
}
.desc-title { color: #e94560; font-size: 20px; margin-bottom: 8px; }
.desc-lead { color: #cfd3e0; margin-bottom: 12px; }
.desc-column p { margin-bottom: 10px; color: #c4c8d6; }
.desc-h3 { color: #e0a64e; font-size: 14px; margin: 16px 0 6px; text-transform: uppercase; letter-spacing: .04em; }
.desc-list { list-style: none; margin: 6px 0 12px; }
.desc-list li { margin-bottom: 4px; }
.desc-mervin { color: #bb86fc; font-weight: 700; }
.desc-mervis { color: #66ff99; font-weight: 700; }
.desc-note { font-size: 12px; color: #6b7088; margin-top: 16px; }
.desc-column code { background: #0f3460; padding: 1px 5px; border-radius: 4px; font-size: 12px; }

/* ---- model column ----------------------------------------------------- */
.model-column .col-header {
  padding: 10px 14px;
  border-bottom: 1px solid #0f3460;
  display: flex;
  align-items: baseline;
  gap: 8px;
  flex-shrink: 0;
}
.model-column .col-name { font-size: 15px; font-weight: 700; color: #eee; }
.model-column .col-info { font-size: 11px; color: #6b7088; }
.model-column .col-badge {
  margin-left: 8px;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .05em;
  padding: 2px 7px;
  border-radius: 10px;
  background: #0f3460;
  color: #8893b5;
}
.model-column.active .col-badge { background: #1b4e2d; color: #66ff99; }
.model-column.switchable .col-badge { background: #3a2f12; color: #e0a64e; }
/* per-column "erase this shared conversation" button (pushed to the right) */
.erase-btn {
  margin-left: auto;
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .04em;
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid #5a2330;
  background: #2a1620;
  color: #e08493;
  cursor: pointer;
}
.erase-btn:hover:not(:disabled) { background: #4a2230; color: #fff; border-color: #e94560; }
.erase-btn:disabled { opacity: .4; cursor: default; }

.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 12px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.input-area {
  padding: 10px 12px;
  border-top: 1px solid #0f3460;
  display: flex;
  gap: 8px;
  flex-shrink: 0;
}
.input-area input {
  flex: 1;
  min-width: 0;
  padding: 9px 12px;
  border-radius: 8px;
  border: 1px solid #0f3460;
  background: #1a1a2e;
  color: #eee;
  font-size: 14px;
  outline: none;
}
.input-area input:focus { border-color: #e94560; }
.input-area button {
  padding: 9px 16px;
  border-radius: 8px;
  border: none;
  background: #e94560;
  color: white;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
}
.input-area button:hover { background: #d63851; }
.input-area input:disabled,
.input-area button:disabled { opacity: .5; cursor: not-allowed; background: #555; }

/* a non-resident but ready model: dimmed, click anywhere to load it */
.model-column.switchable { opacity: .55; cursor: pointer; }
.model-column.switchable:hover { opacity: .8; border-color: #e0a64e; }
.model-column.switchable .chat-area,
.model-column.switchable .input-area { pointer-events: none; }
/* downloading / queued / unavailable: dimmed, not clickable */
.model-column.locked { opacity: .4; cursor: not-allowed; }
.model-column.locked .chat-area,
.model-column.locked .input-area { pointer-events: none; }
.model-column.active { border-color: #2ecc71; cursor: default; }

/* ---- message bubbles -------------------------------------------------- */
.msg.user { display: flex; justify-content: flex-end; }
.msg.user .bubble {
  background: #0f3460;
  border-radius: 12px 12px 2px 12px;
  max-width: 85%;
}
.bubble { padding: 8px 12px; border-radius: 12px; font-size: 14px; line-height: 1.5; max-width: 90%; }
.msg-pair { display: flex; flex-direction: column; gap: 6px; }
.msg-row { display: flex; gap: 8px; align-items: flex-start; }
.avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.mervin-bubble { background: #2d1b4e; border-radius: 12px 12px 12px 2px; border-left: 3px solid #9b59b6; }
.mervis-bubble { background: #1b4e2d; border-radius: 12px 12px 12px 2px; border-left: 3px solid #2ecc71; }
.char-label { font-size: 11px; font-weight: 700; margin-bottom: 2px; opacity: 0.7; }
.mervin-bubble .char-label { color: #bb86fc; }
.mervis-bubble .char-label { color: #66ff99; }
.tokrate { font-size: 11px; color: #666; margin-top: 4px; }
.streaming-cursor::after { content: "▋"; animation: blink 0.7s infinite; }
@keyframes blink { 50% { opacity: 0; } }

/* ---- switching overlay (blocks the model columns) --------------------- */
.switch-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.hidden { display: none !important; }
.spinner {
  width: 48px; height: 48px;
  border: 4px solid #333;
  border-top-color: #e94560;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.switch-overlay p { margin-top: 16px; font-size: 15px; color: #ccc; }
.switch-note { margin-top: 8px !important; font-size: 12px !important; color: #8893b5 !important; max-width: 360px; text-align: center; line-height: 1.5; }
</style>
</head>
<body>

<div class="topbar">
  <button class="nav-btn nav-left" id="nav-left" title="Scroll left" disabled>
    <span class="nav-ico">&#9664;</span>
    <span class="nav-hint">prev</span>
    <span class="nav-label" id="nav-left-label"></span>
  </button>
  <div class="nav-center">
    <span class="hw-info" id="hw-info"></span>
    <span class="status" id="status">Starting...</span>
  </div>
  <button class="nav-btn nav-right" id="nav-right" title="Scroll right" disabled>
    <span class="nav-label" id="nav-right-label"></span>
    <span class="nav-hint">next</span>
    <span class="nav-ico">&#9654;</span>
  </button>
</div>

<div class="columns" id="columns">
  <div class="column desc-column" id="desc-column" data-title="About">Loading description...</div>
</div>

<div class="switch-overlay hidden" id="switch-overlay">
  <div class="spinner"></div>
  <p id="switch-text">Loading model...</p>
  <p class="switch-note">Only one model stays in memory, so switching reads the new
  one from disk. The first load can take several minutes.</p>
</div>

<script>
// Derive base from the path so the app works both at root (serve.py direct)
// and behind a reverse-proxy prefix like /merv/ (Caddy relay).
const API_BASE = location.pathname.replace(/\/(index\.html)?$/, '');

// Add a new model here (and in serve.py) -- columns are built from this object.
const MODELS = {
  phi:     { name: 'Phi-4-mini',  info: '2.4GB Q4_K_M' },
  gemma2b: { name: 'Gemma 4 E2B', info: '3.1GB Q4_K_M' },
  mistral: { name: 'Mistral 7B',  info: '4.4GB Q4_K_M' },
  qwen:    { name: 'Qwen 2.5 7B', info: '4.7GB Q4_K_M' },
  gemma:   { name: 'Gemma 4 E4B', info: '5.0GB Q4_K_M' },
};
const MODEL_KEYS = Object.keys(MODELS);

// The whole arena state lives in the server's DB; this client just mirrors it and
// repaints from it. The only genuinely local state is what we are typing.
let activeModel   = null;    // the resident model (from /health)
let loadingModel  = null;    // a model currently loading (a switch in flight)
let busy          = false;   // a generation/switch is in flight anywhere
let pendingSwitch = null;    // a switch this client just asked for (drives the overlay)
let firstShown    = false;   // have we scrolled the active model into view once?

// Per-model mirror of the DB transcript + the revision we last painted. `optimistic`
// holds a just-typed message we echo immediately, until the DB reflects it.
let history     = {};        // key -> [{role, content, status, n_tokens, gen_ms}]
let localRev    = {};        // key -> revision we last rendered (-1 => fetch next poll)
let optimistic  = {};        // key -> text of a just-sent message not yet in the DB
// From /health: state is 'ready' | 'downloading' | 'pending' | 'unavailable'.
let modelStates = {};

function newId(prefix) {
  if (globalThis.crypto?.randomUUID) return `${prefix}-${globalThis.crypto.randomUUID()}`;
  return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}`;
}
MODEL_KEYS.forEach(k => {
  history[k] = [];
  localRev[k] = -1;
  modelStates[k] = 'pending';
});

const $columns     = document.getElementById('columns');
const $status      = document.getElementById('status');
const $switch      = document.getElementById('switch-overlay');
const $switchText  = document.getElementById('switch-text');
const $desc        = document.getElementById('desc-column');

// ---- build one column per model -----------------------------------------
const cols = {};   // model -> { col, chat, input, send, badge, erase }
MODEL_KEYS.forEach(m => {
  const col = document.createElement('div');
  col.className = 'column model-column locked';
  col.dataset.model = m;
  col.dataset.title = MODELS[m].name;
  col.innerHTML = `
    <div class="col-header">
      <span class="col-name">${MODELS[m].name}</span>
      <span class="col-info">${MODELS[m].info}</span>
      <button class="erase-btn" id="erase-${m}" title="Erase this shared conversation for everyone">Erase</button>
      <span class="col-badge" id="badge-${m}">...</span>
    </div>
    <div class="chat-area" id="chat-${m}"></div>
    <div class="input-area">
      <input type="text" id="input-${m}" placeholder="Type a message..." autocomplete="off" disabled>
      <button id="send-${m}" disabled>Send</button>
    </div>`;
  $columns.appendChild(col);

  const els = {
    col,
    chat:  col.querySelector(`#chat-${m}`),
    input: col.querySelector(`#input-${m}`),
    send:  col.querySelector(`#send-${m}`),
    badge: col.querySelector(`#badge-${m}`),
    erase: col.querySelector(`#erase-${m}`),
  };
  cols[m] = els;

  // Click a dimmed (ready, non-resident) column to load that model.
  col.addEventListener('click', () => {
    if (m === activeModel) { els.input.focus(); return; }
    if (busy || loadingModel) {
      flashStatus(loadingModel ? `Loading ${MODELS[loadingModel].name}...` : 'Busy -- one moment');
      return;
    }
    if (modelStates[m] === 'ready') switchTo(m);
    else flashStatus(stateBlurb(m));
  });
  els.send.addEventListener('click', e => { e.stopPropagation(); sendMessage(m); });
  els.input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(m); });
  els.input.addEventListener('click', e => e.stopPropagation());
  els.erase.addEventListener('click', e => { e.stopPropagation(); eraseConversation(m); });
});

// The active model is pinned to the first model slot (right after the About
// column); the rest stay in ascending size order. Reorder the DOM whenever the
// active model changes. appendChild moves a node, so About (first child) stays put
// and the model columns line up after it.
function reorderColumns() {
  const order = activeModel
    ? [activeModel, ...MODEL_KEYS.filter(k => k !== activeModel)]
    : [...MODEL_KEYS];
  order.forEach(k => $columns.appendChild(cols[k].col));
}

// ---- load the editable description fragment -----------------------------
fetch(API_BASE + '/description.html')
  .then(r => r.ok ? r.text() : Promise.reject(new Error('HTTP ' + r.status)))
  .then(html => { $desc.innerHTML = html; updateNav(); })
  .catch(() => { $desc.innerHTML = '<p class="desc-note">description.html not found.</p>'; });

// ---- column states ------------------------------------------------------
const BADGE = {
  active:      'Active',
  ready:       'Click to load',
  downloading: 'Downloading',
  pending:     'Queued',
  unavailable: 'Unavailable',
};
function stateBlurb(m) {
  const s = modelStates[m];
  if (s === 'downloading' || s === 'pending') return `${MODELS[m].name} is still downloading -- try again shortly`;
  if (s === 'unavailable') return `${MODELS[m].name} is not available on this server`;
  return '';
}

// Reflect server state on every column: one active (enabled), ready ones
// switchable (dimmed, clickable), the rest locked (dimmed, not clickable).
function renderColumns() {
  MODEL_KEYS.forEach(m => {
    const els = cols[m];
    const isActive  = m === activeModel;
    const isLoading = m === loadingModel;
    const ready = modelStates[m] === 'ready';
    els.col.classList.toggle('active', isActive && !loadingModel);
    els.col.classList.toggle('switchable', !isActive && ready && !busy && !loadingModel);
    els.col.classList.toggle('locked', (!isActive && !ready) || ((busy || !!loadingModel) && !isActive));
    els.badge.textContent = isLoading ? 'Loading...'
                          : isActive  ? (busy ? 'Replying...' : BADGE.active)
                          : (BADGE[modelStates[m]] || '...');
    // Block typing until the current reply is done: only the resident model takes
    // input, and only when the arena is idle (nothing generating or loading).
    const enable = isActive && ready && !busy && !loadingModel;
    els.input.disabled = !enable;
    els.send.disabled  = !enable;
    const has = !!(history[m] && history[m].length);
    els.erase.disabled = !has;
    els.erase.style.display = has ? '' : 'none';
  });
}

let statusTimer = null;
function flashStatus(msg) {
  if (!msg) return;
  $status.textContent = msg;
  clearTimeout(statusTimer);
  statusTimer = setTimeout(updateStatus, 3500);
}
function updateStatus() {
  if (loadingModel) { $status.textContent = `Loading ${MODELS[loadingModel].name}...`; return; }
  if (!activeModel) { $status.textContent = 'Connecting...'; return; }
  const base = busy ? `${MODELS[activeModel].name} is replying...` : `Active: ${MODELS[activeModel].name}`;
  const dl = MODEL_KEYS.filter(m => modelStates[m] === 'downloading' || modelStates[m] === 'pending');
  $status.textContent = dl.length
    ? `${base} — downloading ${dl.map(m => MODELS[m].name).join(', ')}`
    : base;
}

// ---- loading overlay (shown for everyone while a model loads) ------------
let overlayT0 = 0, overlayTimer = null, overlayBase = '';
function showOverlay(text) {
  overlayBase = text;
  if (!overlayTimer) {
    overlayT0 = performance.now();
    const tick = () => { $switchText.textContent = `${overlayBase}  ${Math.round((performance.now() - overlayT0) / 1000)}s`; };
    tick();
    overlayTimer = setInterval(tick, 500);
  }
  $switch.classList.remove('hidden');
}
function hideOverlay() {
  if (overlayTimer) { clearInterval(overlayTimer); overlayTimer = null; }
  $switch.classList.add('hidden');
}

// ---- switching the resident model ---------------------------------------
// Enqueue a switch and let the poll loop drive the overlay + re-pin from the DB.
async function switchTo(model) {
  if (model === activeModel || busy || loadingModel) return;
  if (modelStates[model] !== 'ready') { flashStatus(stateBlurb(model)); return; }
  pendingSwitch = model;
  showOverlay(`Loading ${MODELS[model].name}...`);
  try {
    const resp = await fetch(API_BASE + '/enqueue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ kind: 'switch', model })
    });
    if (!resp.ok) { const e = await resp.json().catch(() => ({})); throw new Error(e.error || `HTTP ${resp.status}`); }
  } catch (e) {
    pendingSwitch = null;
    hideOverlay();
    flashStatus(`Error: ${e.message}`);
  }
}

// ---- top-bar navigation: edge arrows label the hidden neighbour columns,
//      the centre shows the current (leftmost fully-visible) column ----------
const $navLeft      = document.getElementById('nav-left');
const $navRight     = document.getElementById('nav-right');
const $navLeftLabel = document.getElementById('nav-left-label');
const $navRightLabel= document.getElementById('nav-right-label');
const PAD = 14;   // .columns left padding, so a scrolled column sits flush

function allColumns() { return [...$columns.querySelectorAll('.column')]; }

function scrollToCol(col) {
  if (col) $columns.scrollTo({ left: col.offsetLeft - PAD, behavior: 'smooth' });
}

// Bring the active model into view if it is off-screen. Used once on first load
// (the resident model may be a column that starts scrolled out), NOT on user
// switches -- those click an already-visible column and must not move the view.
function ensureActiveVisible() {
  const col = activeModel && cols[activeModel] && cols[activeModel].col;
  if (!col) return;
  const left = $columns.scrollLeft, right = left + $columns.clientWidth;
  const visible = col.offsetLeft >= left - 1 && col.offsetLeft + col.offsetWidth <= right + 1;
  if (!visible) scrollToCol(col);
}

// Recompute the three labels + arrow enabled-state from the scroll position.
function updateNav() {
  const colsArr = allColumns();
  if (!colsArr.length) return;
  const left = $columns.scrollLeft;
  const right = left + $columns.clientWidth;
  const fully = colsArr.filter(c => c.offsetLeft >= left - 1 && c.offsetLeft + c.offsetWidth <= right + 1);
  const current = fully[0] || colsArr.reduce((best, c) => {
    const cc = c.offsetLeft + c.offsetWidth / 2, center = (left + right) / 2;
    return (!best || Math.abs(cc - center) < Math.abs(best.offsetLeft + best.offsetWidth/2 - center)) ? c : best;
  }, null);
  const idx = colsArr.indexOf(current);
  const lastVis = fully[fully.length - 1] || current;
  const leftHidden  = colsArr[idx - 1] || null;
  const rightHidden = colsArr[colsArr.indexOf(lastVis) + 1] || null;

  // The centred title is a static "Hardware" label; arrows still name the
  // hidden neighbour columns. (Model names live in each column heading.)
  $navLeftLabel.textContent  = leftHidden  ? leftHidden.dataset.title  : '';
  $navRightLabel.textContent = rightHidden ? rightHidden.dataset.title : '';
  $navLeft.disabled  = !leftHidden;
  $navRight.disabled = !rightHidden;
  $navLeft._target  = leftHidden;
  $navRight._target = rightHidden;
}

$navLeft.addEventListener('click',  () => scrollToCol($navLeft._target));
$navRight.addEventListener('click', () => scrollToCol($navRight._target));
$columns.addEventListener('scroll', () => { window.requestAnimationFrame(updateNav); });
window.addEventListener('resize', updateNav);

// ---- rendering replies --------------------------------------------------
function parseMervinMervis(text) {
  const mervin = text.match(/<Mervin>([\s\S]*?)<\/Mervin>/);
  const mervis = text.match(/<Mervis>([\s\S]*?)<\/Mervis>/);
  return { mervin: mervin ? mervin[1].trim() : null, mervis: mervis ? mervis[1].trim() : null };
}
function assistantBubbles(content) {
  const p = parseMervinMervis(content);
  let html = '';
  if (p.mervin)
    html += `<div class="msg-row"><img src="img/bot-sad.png" class="avatar"><div class="bubble mervin-bubble"><div class="char-label">MERVIN</div>${escapeHtml(p.mervin)}</div></div>`;
  if (p.mervis)
    html += `<div class="msg-row"><img src="img/bot-happy.png" class="avatar"><div class="bubble mervis-bubble"><div class="char-label">MERVIS</div>${escapeHtml(p.mervis)}</div></div>`;
  if (!html) {
    const clean = content.replace(/<\/?Merv\w*>/g, '').trim();
    html = `<div class="bubble mervin-bubble">${escapeHtml(clean)}</div>`;
  }
  return html;
}
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
// tok/s caption built from what the server stored on the assistant row, so it
// persists across repaints and is identical for every viewer.
function tokRate(nTokens, genMs) {
  if (!genMs || genMs <= 0 || !nTokens) return '';
  const secs = genMs / 1000;
  return `<div class="tokrate">${(nTokens / secs).toFixed(1)} tok/s &middot; ${secs.toFixed(1)}s</div>`;
}

// ---- repaint a column entirely from the DB snapshot ---------------------
function renderColumnHistory(model) {
  const chatEl = cols[model].chat;
  const msgs = history[model] || [];
  let html = '';
  msgs.forEach(m => {
    if (m.role === 'user') {
      html += `<div class="msg user"><div class="bubble">${escapeHtml(m.content)}</div></div>`;
    } else if (m.status === 'streaming') {
      // While streaming, show the RAW response (tags visible, just escaped) so the
      // user sees exactly what the model emits; it splits into two bubbles on done.
      html += `<div class="msg-pair"><div class="bubble mervin-bubble streaming-cursor">${escapeHtml(m.content || '') || 'Thinking...'}</div></div>`;
    } else {
      html += `<div class="msg-pair">${assistantBubbles(m.content)}${tokRate(m.n_tokens, m.gen_ms)}</div>`;
    }
  });
  // Echo a just-typed message until the DB has it, then drop the echo.
  const opt = optimistic[model];
  if (opt && !msgs.some(m => m.role === 'user' && m.content === opt)) {
    html += `<div class="msg user"><div class="bubble">${escapeHtml(opt)}</div></div>`;
  } else if (opt) {
    optimistic[model] = null;
  }
  chatEl.innerHTML = html;
  chatEl.scrollTop = chatEl.scrollHeight;
}

async function refreshHistory(model) {
  try {
    const r = await fetch(API_BASE + '/history?model=' + encodeURIComponent(model));
    if (!r.ok) return;
    const d = await r.json();
    history[model]  = Array.isArray(d.messages) ? d.messages : [];
    localRev[model] = d.rev ?? 0;
    renderColumnHistory(model);
  } catch { /* leave the column as-is on a transient error */ }
}

async function eraseConversation(model) {
  if (!(history[model] && history[model].length)) return;
  if (!confirm(`Erase the shared ${MODELS[model].name} conversation? This clears it for everyone.`)) return;
  try {
    const r = await fetch(API_BASE + '/clear', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model })
    });
    if (!r.ok) { flashStatus('Erase failed'); return; }
    const d = await r.json();
    history[model]  = [];
    localRev[model] = d.rev ?? (localRev[model] + 1);
    optimistic[model] = null;
    renderColumnHistory(model);
    renderColumns();
  } catch { flashStatus('Erase failed'); }
}

// ---- send a message: enqueue it; the poll loop paints the streamed reply --
async function sendMessage(model) {
  if (model !== activeModel || busy || loadingModel) return;
  const els = cols[model];
  const text = els.input.value.trim();
  if (!text) return;
  els.input.value = '';
  optimistic[model] = text;        // echo immediately
  busy = true;                     // disable input now; the poll keeps it until done
  renderColumnHistory(model);
  renderColumns();
  try {
    const resp = await fetch(API_BASE + '/enqueue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ kind: 'chat', request_id: newId('req'), content: text })
    });
    if (!resp.ok) {
      const e = await resp.json().catch(() => ({}));
      optimistic[model] = null;
      busy = false;
      if (els.input.value === '') els.input.value = text;   // hand the message back
      flashStatus(e.error || `HTTP ${resp.status}`);
      renderColumnHistory(model);
      renderColumns();
    }
    // On success: nothing more to do here. The worker writes the reply into the DB
    // and every client (including us) paints it from the next /history poll.
  } catch (e) {
    optimistic[model] = null;
    busy = false;
    if (els.input.value === '') els.input.value = text;
    flashStatus(e.message);
    renderColumnHistory(model);
    renderColumns();
  }
}

// ---- health polling: repaint everything from the snapshot ----------------
function applyHealth(data) {
  if (data.hardware) document.getElementById('hw-info').textContent = data.hardware;
  if (data.states) modelStates = { ...modelStates, ...data.states };
  loadingModel = data.loading || null;
  busy = !!data.busy;
  // The server owns the resident model. If it changed (we switched, or another
  // user did), re-pin the layout so the active model sits in the first slot.
  if (data.model && data.model !== activeModel) {
    activeModel = data.model;
    reorderColumns();
    updateNav();
    ensureActiveVisible();
  }
  // Drive the loading overlay purely from server state (+ a switch we just asked for).
  if (loadingModel) showOverlay(`Loading ${MODELS[loadingModel].name}...`);
  else if (pendingSwitch && activeModel !== pendingSwitch) showOverlay(`Loading ${MODELS[pendingSwitch].name}...`);
  else { pendingSwitch = null; hideOverlay(); }
  // Refetch any column whose revision moved (a reply streamed, a message sent, an
  // erase). This is how every client sees the streaming text grow.
  if (data.revs) {
    MODEL_KEYS.forEach(m => {
      if (data.revs[m] !== undefined && data.revs[m] !== localRev[m]) refreshHistory(m);
    });
  }
  renderColumns();
  if (!statusTimer) updateStatus();
}

async function init() {
  renderColumns();
  updateNav();
  $status.textContent = 'Connecting...';
  // Poll forever; faster while something streams/loads so the reply animates.
  const poll = async () => {
    let delay = 2000;
    try {
      const resp = await fetch(API_BASE + '/health');
      if (resp.ok) {
        const data = await resp.json();
        if (data.status === 'loading' && !data.model) {
          $status.textContent = 'Loading model...';
          setTimeout(poll, 1000);
          return;
        }
        applyHealth(data);
        if (!firstShown && activeModel) { ensureActiveVisible(); firstShown = true; }
        const downloading = MODEL_KEYS.some(m => modelStates[m] === 'downloading' || modelStates[m] === 'pending');
        delay = (busy || loadingModel) ? 1000 : (downloading ? 1500 : 2000);
      }
    } catch (e) {
      $status.textContent = 'Server not running -- start serve.py first';
      setTimeout(poll, 2000);
      return;
    }
    setTimeout(poll, delay);
  };
  poll();
}
init();
</script>

</html>
