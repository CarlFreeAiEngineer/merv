<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mervin/Mervis -- Model Arena</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: #1a1a2e;
  color: #eee;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  padding: 12px 20px;
  background: #16213e;
  border-bottom: 1px solid #0f3460;
  display: flex;
  align-items: center;
  gap: 16px;
}
.header h1 { font-size: 18px; color: #e94560; }
.header select {
  padding: 6px 10px;
  border-radius: 8px;
  border: 1px solid #0f3460;
  background: #1a1a2e;
  color: #eee;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  outline: none;
}
.header select:focus { border-color: #e94560; }
.header .model-info { font-size: 11px; color: #666; }
.header .status { font-size: 13px; color: #888; margin-left: auto; }
.chat-container {
  flex: 1;
  position: relative;
  overflow: hidden;
}
.chat-area {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 12px 20px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}
.msg {
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.msg.user { justify-content: flex-end; }
.msg.user .bubble {
  background: #0f3460;
  border-radius: 12px 12px 2px 12px;
  max-width: 80%;
}
.bubble {
  padding: 8px 12px;
  border-radius: 12px;
  max-width: 85%;
  font-size: 14px;
  line-height: 1.5;
}
.msg-pair { display: flex; flex-direction: column; gap: 6px; }
.msg-row { display: flex; gap: 8px; align-items: flex-start; }
.avatar { width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
.mervin-bubble {
  background: #2d1b4e;
  border-radius: 12px 12px 12px 2px;
  border-left: 3px solid #9b59b6;
}
.mervis-bubble {
  background: #1b4e2d;
  border-radius: 12px 12px 12px 2px;
  border-left: 3px solid #2ecc71;
}
.char-label {
  font-size: 11px;
  font-weight: 700;
  margin-bottom: 2px;
  opacity: 0.7;
}
.tokrate { font-size: 11px; color: #666; margin-top: 4px; }
.mervin-bubble .char-label { color: #bb86fc; }
.mervis-bubble .char-label { color: #66ff99; }
.loading-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.7);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
}
.hidden { display: none !important; }
.spinner {
  width: 48px;
  height: 48px;
  border: 4px solid #333;
  border-top-color: #e94560;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-overlay p { margin-top: 16px; font-size: 15px; color: #ccc; }
.input-area {
  padding: 12px 20px;
  background: #16213e;
  border-top: 1px solid #0f3460;
  display: flex;
  gap: 10px;
}
.input-area input {
  flex: 1;
  padding: 10px 14px;
  border-radius: 8px;
  border: 1px solid #0f3460;
  background: #1a1a2e;
  color: #eee;
  font-size: 14px;
  outline: none;
}
.input-area input:focus { border-color: #e94560; }
.input-area button {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  background: #e94560;
  color: white;
  font-weight: 600;
  cursor: pointer;
  font-size: 14px;
}
.input-area button:hover { background: #d63851; }
.input-area button:disabled { background: #555; cursor: not-allowed; }
.streaming-cursor::after {
  content: "▋";
  animation: blink 0.7s infinite;
}
@keyframes blink { 50% { opacity: 0; } }
</style>
</head>
<body>

<div class="header">
  <h1>Mervin/Mervis Arena</h1>
  <select id="model-select"></select>
  <span class="model-info" id="model-info"></span>
  <span class="status" id="status">Starting...</span>
</div>

<div class="chat-container" id="chat-container"></div>

<div class="loading-overlay hidden" id="loading">
  <div class="spinner"></div>
  <p id="loading-text">Loading model...</p>
</div>

<div class="input-area">
  <input type="text" id="input" placeholder="Type a message..." autocomplete="off">
  <button id="send">Send</button>
</div>

<script>
// Derive base from the path so the app works both at root (serve.py direct)
// and behind a reverse-proxy prefix like /merv/ (Caddy relay).
const API_BASE = location.pathname.replace(/\/(index\.html)?$/, '');
// Add a new model here (and in serve.py) -- the dropdown and chat areas are
// built from this object, so no other UI change is needed.
const MODELS = {
  phi:     { name: 'Phi-4-mini',  info: '2.4GB Q4_K_M' },
  gemma:   { name: 'Gemma 4 E4B', info: '5.0GB Q4_K_M' },
  gemma2b: { name: 'Gemma 4 E2B', info: '3.1GB Q4_K_M' },
  qwen:    { name: 'Qwen 2.5 7B', info: '4.7GB Q4_K_M' },
  mistral: { name: 'Mistral 7B',  info: '4.4GB Q4_K_M' },
};
// No system prompt: the Mervin/Mervis behavior is baked in by fine-tuning.

const MODEL_KEYS = Object.keys(MODELS);
let activeModel = MODEL_KEYS[0];
let generating = false;
// History is kept per model in memory, so it survives switching the dropdown
// even though only one model's chat is shown at a time.
let conversations = {};
let chatIds = {};
// Populated from /health. Per-model state is one of:
//   ready       -> selectable
//   downloading -> weights are being fetched on the server (shown, disabled)
//   pending     -> queued to download (shown, disabled)
//   unavailable -> can't run on this host, e.g. qwen off-Mac (shown, disabled)
let availableModels = {};
let modelStates = {};
function newId(prefix) {
  if (globalThis.crypto?.randomUUID) return `${prefix}-${globalThis.crypto.randomUUID()}`;
  return `${prefix}-${Date.now().toString(36)}-${Math.random().toString(36).slice(2)}`;
}
MODEL_KEYS.forEach(k => {
  conversations[k] = [];
  chatIds[k] = newId(`chat-${k}`);
  availableModels[k] = true;
  modelStates[k] = 'ready';
});

const $input = document.getElementById('input');
const $send = document.getElementById('send');
const $loading = document.getElementById('loading');
const $loadingText = document.getElementById('loading-text');
const $status = document.getElementById('status');
const $select = document.getElementById('model-select');
const $modelInfo = document.getElementById('model-info');
const $chatContainer = document.getElementById('chat-container');

// Build dropdown options and one chat area per model.
MODEL_KEYS.forEach(m => {
  const opt = document.createElement('option');
  opt.value = m;
  opt.textContent = MODELS[m].name;
  $select.appendChild(opt);

  const chat = document.createElement('div');
  chat.className = 'chat-area hidden';
  chat.id = 'chat-' + m;
  $chatContainer.appendChild(chat);
});

function showLoading(text) {
  $loadingText.textContent = text;
  $loading.classList.remove('hidden');
}
function hideLoading() { $loading.classList.add('hidden'); }

function showActiveChat() {
  MODEL_KEYS.forEach(m => {
    document.getElementById('chat-' + m).classList.toggle('hidden', m !== activeModel);
  });
  $select.value = activeModel;
  $modelInfo.textContent = MODELS[activeModel].info || '';
}

const STATE_SUFFIX = {
  downloading: ' (downloading...)',
  pending:     ' (queued)',
  unavailable: ' (unavailable)',
};

function refreshOptions() {
  MODEL_KEYS.forEach(m => {
    const opt = $select.querySelector(`option[value="${m}"]`);
    const state = modelStates[m] || (availableModels[m] ? 'ready' : 'unavailable');
    opt.disabled = state !== 'ready';
    opt.textContent = MODELS[m].name + (STATE_SUFFIX[state] || '');
  });
}

function parseMervinMervis(text) {
  const mervinMatch = text.match(/<Mervin>([\s\S]*?)<\/Mervin>/);
  const mervisMatch = text.match(/<Mervis>([\s\S]*?)<\/Mervis>/);
  return {
    mervin: mervinMatch ? mervinMatch[1].trim() : null,
    mervis: mervisMatch ? mervisMatch[1].trim() : null,
    raw: text
  };
}

function renderMessage(chatEl, role, content) {
  if (role === 'user') {
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `<div class="bubble">${escapeHtml(content)}</div>`;
    chatEl.appendChild(div);
  } else {
    const parsed = parseMervinMervis(content);
    const div = document.createElement('div');
    div.className = 'msg-pair';
    if (parsed.mervin && parsed.mervis) {
      div.innerHTML += `<div class="msg-row"><img src="img/bot-sad.png" class="avatar"><div class="bubble mervin-bubble"><div class="char-label">MERVIN</div>${escapeHtml(parsed.mervin)}</div></div>`;
      div.innerHTML += `<div class="msg-row"><img src="img/bot-happy.png" class="avatar"><div class="bubble mervis-bubble"><div class="char-label">MERVIS</div>${escapeHtml(parsed.mervis)}</div></div>`;
    } else {
      div.innerHTML = `<div class="bubble mervin-bubble">${escapeHtml(content)}</div>`;
    }
    chatEl.appendChild(div);
  }
  chatEl.scrollTop = chatEl.scrollHeight;
}

function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// Throughput caption shown under each reply. Uses the server's token count when
// present, otherwise approximates from characters (~4 chars/token) -- marked '~'.
function tokRateCaption(text, firstT, lastT, usageTokens) {
  if (firstT === null || lastT === null || lastT <= firstT) return '';
  const secs = (lastT - firstT) / 1000;
  const approx = !usageTokens;
  const toks = usageTokens || Math.max(1, Math.round(text.length / 4));
  const rate = (toks / secs).toFixed(1);
  return `<div class="tokrate">${approx ? '~' : ''}${rate} tok/s &middot; ${secs.toFixed(1)}s</div>`;
}

async function switchModel(model) {
  if (model === activeModel) return;
  if (generating) { $select.value = activeModel; return; }
  const state = modelStates[model] || (availableModels[model] ? 'ready' : 'unavailable');
  if (state !== 'ready') {
    $status.textContent = (state === 'downloading' || state === 'pending')
      ? `${MODELS[model].name} is still downloading -- try again shortly`
      : `${MODELS[model].name} is not available on this server`;
    $select.value = activeModel;
    return;
  }
  showLoading(`Switching to ${MODELS[model].name}...`);
  activeModel = model;
  showActiveChat();
  try {
    const resp = await fetch(API_BASE + '/switch', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: model })
    });
    if (!resp.ok) throw new Error(await resp.text());
    $status.textContent = `Active: ${MODELS[model].name}`;
  } catch (e) {
    $status.textContent = `Error: ${e.message}`;
  }
  hideLoading();
  $input.focus();
}

async function sendMessage() {
  const text = $input.value.trim();
  if (!text || generating) return;
  $input.value = '';
  generating = true;
  $send.disabled = true;

  // Ask server which model is actually active
  try {
    const h = await fetch(API_BASE + '/health');
    const hd = await h.json();
    if (hd.model && hd.model !== activeModel) {
      activeModel = hd.model;
      showActiveChat();
    }
    $status.textContent = `Active: ${MODELS[activeModel].name}`;
  } catch {}

  const chatEl = document.getElementById('chat-' + activeModel);
  renderMessage(chatEl, 'user', text);
  conversations[activeModel].push({ role: 'user', content: text });

  const streamDiv = document.createElement('div');
  streamDiv.className = 'msg-pair';
  streamDiv.innerHTML = `<div class="bubble mervin-bubble streaming-cursor"></div>`;
  chatEl.appendChild(streamDiv);
  chatEl.scrollTop = chatEl.scrollHeight;

  let fullText = '';
  let firstT = null, lastT = null, usageTokens = null;
  let failed = false;
  let waitingTimer = null;
  try {
    const messages = [...conversations[activeModel]];
    const requestId = newId('req');
    console.log('[send] messages:', messages.length, 'model:', activeModel);
    waitingTimer = setTimeout(() => {
      if (!fullText) {
        streamDiv.innerHTML = `<div class="bubble mervin-bubble streaming-cursor">Waiting for first token...</div>`;
      }
    }, 2500);
    const resp = await fetch(API_BASE + '/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        chat_id: chatIds[activeModel],
        request_id: requestId,
        messages,
        stream: true,
        max_tokens: 1024
      })
    });
    console.log('[send] response status:', resp.status);
    if (!resp.ok) { throw new Error(`HTTP ${resp.status}: ${await resp.text()}`); }
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        const data = line.slice(6);
        if (data === '[DONE]') break;
        let j = null;
        try {
          j = JSON.parse(data);
        } catch {
          continue;
        }
        if (j.error) {
          failed = true;
          throw new Error(typeof j.error === 'string' ? j.error : JSON.stringify(j.error));
        }
        if (j.usage?.completion_tokens) usageTokens = j.usage.completion_tokens;
        const delta = j.choices?.[0]?.delta?.content;
        if (delta) {
          const now = performance.now();
          if (firstT === null) firstT = now;
          lastT = now;
          fullText += delta;
          streamDiv.innerHTML = `<div class="bubble mervin-bubble streaming-cursor">${escapeHtml(fullText)}</div>`;
          chatEl.scrollTop = chatEl.scrollHeight;
        }
      }
    }
  } catch (e) {
    console.error('[send] error:', e);
    failed = true;
    streamDiv.innerHTML = `<div class="bubble mervin-bubble" style="color:#e94560">Error: ${escapeHtml(e.message)}</div>`;
  } finally {
    if (waitingTimer) clearTimeout(waitingTimer);
  }

  console.log('[send] complete, fullText length:', fullText.length, 'preview:', fullText.slice(0, 100));
  if (!failed && fullText.trim()) {
    conversations[activeModel].push({ role: 'assistant', content: fullText });
  } else if (!failed) {
    streamDiv.innerHTML = `<div class="bubble mervin-bubble" style="color:#e94560">Error: empty response from model</div>`;
    generating = false;
    $send.disabled = false;
    $input.focus();
    return;
  } else {
    generating = false;
    $send.disabled = false;
    $input.focus();
    return;
  }
  const parsed = parseMervinMervis(fullText);
  let finalHtml = '';
  if (parsed.mervin && parsed.mervis) {
    finalHtml += `<div class="msg-row"><img src="img/bot-sad.png" class="avatar"><div class="bubble mervin-bubble"><div class="char-label">MERVIN</div>${escapeHtml(parsed.mervin)}</div></div>`;
    finalHtml += `<div class="msg-row"><img src="img/bot-happy.png" class="avatar"><div class="bubble mervis-bubble"><div class="char-label">MERVIS</div>${escapeHtml(parsed.mervis)}</div></div>`;
  } else {
    finalHtml = `<div class="bubble mervin-bubble">${escapeHtml(fullText)}</div>`;
  }
  finalHtml += tokRateCaption(fullText, firstT, lastT, usageTokens);
  streamDiv.innerHTML = finalHtml;
  chatEl.scrollTop = chatEl.scrollHeight;

  generating = false;
  $send.disabled = false;
  $input.focus();
}

$select.addEventListener('change', () => switchModel($select.value));
$send.addEventListener('click', sendMessage);
$input.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

function applyHealth(data) {
  if (data.states) modelStates = { ...modelStates, ...data.states };
  if (data.available) availableModels = { ...availableModels, ...data.available };
  MODEL_KEYS.forEach(m => { if (modelStates[m]) availableModels[m] = modelStates[m] === 'ready'; });
  refreshOptions();
}

// Poll /health: fast while the first model is loading, then every few seconds
// as long as any model is still downloading so the dropdown enables each one as
// its weights land. Stops once everything is ready/unavailable.
async function init() {
  showActiveChat();
  $status.textContent = 'Connecting...';
  let started = false;
  const poll = async () => {
    let keepGoing = false;
    try {
      const resp = await fetch(API_BASE + '/health');
      if (resp.ok) {
        const data = await resp.json();
        applyHealth(data);
        if (data.status === 'loading') {
          $status.textContent = 'Loading model...';
          setTimeout(poll, 1000);
          return;
        }
        if (!started) { activeModel = data.model || activeModel; showActiveChat(); started = true; }
        hideLoading();
        const dl = MODEL_KEYS.filter(m => modelStates[m] === 'downloading' || modelStates[m] === 'pending');
        $status.textContent = dl.length
          ? `Active: ${MODELS[activeModel].name} — downloading ${dl.map(m => MODELS[m].name).join(', ')}`
          : `Active: ${MODELS[activeModel].name}`;
        keepGoing = dl.length > 0;
      }
    } catch (e) {
      console.error('[init] failed:', e);
      $status.textContent = 'Server not running -- start serve.py first';
      setTimeout(poll, 2000);
      return;
    }
    if (keepGoing) setTimeout(poll, 3000);
  };
  poll();
}
init();
</script>
</body>
</html>
